# .github/workflows/ci.yml
name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint with ruff
        run: ruff check .
      - name: Type check with mypy
        run: mypy src/
      - name: Test
        run: pytest
      - name: Build Docker
        run: docker build -t aetherchat -f docker/Dockerfile.api .