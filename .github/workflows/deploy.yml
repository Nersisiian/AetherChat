name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and push to Hugging Face
        uses: huggingface/hub-deploy-action@v0
        with:
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_id: your-username/aetherchat
          # или используйте Docker деплой